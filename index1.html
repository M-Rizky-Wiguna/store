<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let data = [
    {barang: "sepatu", harga: 10000},
    {barang: "tas", harga: 50000},
    {barang: "buku", harga: 1000},
];
let produk = data.map((item) =>{
    return `
    <h1>${item.barang}</h1>
    <p>${item.harga}</p>
    `
});
document.write(produk.join(""))
    </script>
</body>
</html>
